<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="TVK Infrastructure and Energy Systems">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1B"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="gCyan" x1="80" y1="220" x2="240" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#00BFFF"/>
    </linearGradient>
    <linearGradient id="gStem" x1="160" y1="250" x2="160" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#FF1493"/>
    </linearGradient>
    <linearGradient id="gWarm" x1="185" y1="260" x2="230" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FFFF00"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <line x1="80" y1="220" x2="240" y2="220" stroke="url(#gCyan)" stroke-width="22"/>
    <line x1="160" y1="250" x2="160" y2="420" stroke="url(#gStem)" stroke-width="22"/>
    <line x1="185" y1="260" x2="230" y2="420" stroke="url(#gWarm)" stroke-width="22"/>
  </g>
  <text x="280" y="280" fill="#ffffff" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="80" font-weight="700" letter-spacing="0.06em">TVK</text>
  <text x="280" y="330" fill="#ffffff" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="22" font-weight="500" letter-spacing="0.14em">INFRASTRUCTURE &amp; ENERGY SYSTEMS LTD</text>
  <text x="80" y="420" fill="#ffffff" font-family="'Source Sans 3', system-ui, sans-serif" font-size="28">Empowering Resilience with Smart Infrastructure and Smart Energy</text>
</svg>
